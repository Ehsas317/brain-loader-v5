#
# PROJECT:    Ladder (formerly Brain Loader v5)
# REPO:       https://github.com/Ehsas317/ladder
# WHAT:       The Ponytail decision ladder is the actual innovation here.
#             It climbs rungs to skip work. Named after the thing that makes
#             it unique.
#
# THIS FILE:
#   Configuration for the Ladder orchestrator. Copy to config.yaml and
#   customize. Environment variables override these values.
#
# HOW TO USE LADDER:
#   1. Install:    pip install -r requirements.txt
#   2. Configure:  Copy to config.yaml, add your API keys
#   3. Run:        python main.py "Your project goal"
#
# ═══════════════════════════════════════════════════════════════════════════

# Ladder Configuration
# Copy to config.yaml and customize. Environment variables override these values.

# Execution mode: local | api | hybrid
mode: hybrid

# ─────────────────────────────────────────────
# Ponytail Decision Ladder
# ─────────────────────────────────────────────
ponytail:
  mode: lite               # lite | full | ultra

  ladder:
    rung_1_brain_direct: true      # Can brain answer without specialists?
    rung_2_memory_reuse: true      # Check memory.md for previous solutions
    rung_3_stdlib_first: false     # Prefer platform/stdlib over custom code
    rung_4_merge_tasks: false      # Merge parallel-safe tasks when possible
    rung_5_minimal_output: true    # Specialists write minimum viable code

  annotations:
    enabled: true                   # Add `ponytail:` comments to all outputs
    include_upgrade_path: true      # Note when to upgrade from minimal solution

# ─────────────────────────────────────────────
# Trio Structured Concurrency Timeouts
# ─────────────────────────────────────────────
trio:
  wave_timeout: 300       # Max seconds per wave nursery
  task_timeout: 120       # Max seconds per individual task
  brain_timeout: 180      # Max seconds for brain planning/synthesis

# ─────────────────────────────────────────────
# Provider Configuration
# ─────────────────────────────────────────────
providers:
  anthropic:
    enabled: true
    api_key_env: "ANTHROPIC_API_KEY"
    model: claude-sonnet-4-20250514
    base_url: "https://api.anthropic.com/v1"
    timeout: 60
    cost_per_1m_input: 3.0
    cost_per_1m_output: 15.0

  openai:
    enabled: true
    api_key_env: "OPENAI_API_KEY"
    model: gpt-4o-mini
    base_url: "https://api.openai.com/v1"
    timeout: 60
    cost_per_1m_input: 0.15
    cost_per_1m_output: 0.60

  openrouter:
    enabled: true
    api_key_env: "OPENROUTER_API_KEY"
    model: openrouter/auto
    base_url: "https://openrouter.ai/api/v1"
    timeout: 60
    cost_per_1m_input: 1.0
    cost_per_1m_output: 2.0

  groq:
    enabled: true
    api_key_env: "GROQ_API_KEY"
    model: llama-3.3-70b-versatile
    base_url: "https://api.groq.com/openai/v1"
    timeout: 30
    cost_per_1m_input: 0.0
    cost_per_1m_output: 0.0
    rpm_limit: 30

  gemini:
    enabled: true
    api_key_env: "GOOGLE_API_KEY"
    model: gemini-2.5-flash
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    timeout: 60
    cost_per_1m_input: 0.15
    cost_per_1m_output: 0.60

  deepseek:
    enabled: true
    api_key_env: "DEEPSEEK_API_KEY"
    model: deepseek-chat
    base_url: "https://deepseek.com/v1"
    timeout: 60
    cost_per_1m_input: 0.14
    cost_per_1m_output: 0.28

  ollama:
    enabled: false
    model: qwen3:32b
    base_url: "http://localhost:11434"
    timeout: 300
    cost_per_1m_input: 0.0
    cost_per_1m_output: 0.0

  mlx:
    enabled: false
    model: mlx-community/Qwen3-32B-4bit
    cost_per_1m_input: 0.0
    cost_per_1m_output: 0.0

# ─────────────────────────────────────────────
# Provider Chains per Role
# ─────────────────────────────────────────────
chains:
  researcher: [openrouter, groq, deepseek, ollama]
  coder: [deepseek, groq, openai, openrouter, ollama]
  critic: [anthropic, openai, deepseek]
  writer: [deepseek, groq, openai]
  default: [deepseek, groq, openai, openrouter]

# ─────────────────────────────────────────────
# Circuit Breaker Settings
# ─────────────────────────────────────────────
circuit_breaker:
  failure_threshold: 3          # Failures before opening
  recovery_timeout: 60          # Seconds before half-open
  half_open_max_calls: 2        # Test calls in half-open state

# ─────────────────────────────────────────────
# Cost Control
# ─────────────────────────────────────────────
cost:
  max_cost_per_project: 10.0    # Hard stop limit ($)
  warn_threshold: 0.85          # Warning at 85% of limit
  track_yagni: true             # Track Ponytail savings

# ─────────────────────────────────────────────
# Memory
# ─────────────────────────────────────────────
memory:
  max_size_bytes: 3072
  file: memory.md

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging:
  level: INFO
  directory: logs

# ─────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────
outputs:
  directory: outputs
